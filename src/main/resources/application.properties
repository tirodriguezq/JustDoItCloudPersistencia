server.port=8082

spring.application.name=JustDoItCloudPresentacion
spring.web.locale=es_CR
spring.web.locale-resolver=fixed

spring.sql.init.mode=always
spring.sql.init.platform=mysql
spring.sql.init.encoding=UTF-8

spring.datasource.url=jdbc:mysql://localhost:3307/justdoitdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
